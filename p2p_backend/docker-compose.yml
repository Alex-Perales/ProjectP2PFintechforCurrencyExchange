version: '3.8'

services:
  p2p_postgres:
    image: postgres:15-alpine
    container_name: p2p_postgres
    environment:
      POSTGRES_USER: p2p_user
      POSTGRES_PASSWORD: p2p_password
      POSTGRES_DB: p2p_exchange_dev
    ports:
      - "5432:5432"
    volumes:
      - p2p_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2p_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p2p_network

  p2p_redis:
    image: redis:7-alpine
    container_name: p2p_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p2p_network

  p2p_backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p_backend
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      DATABASE_URL: postgresql://p2p_user:p2p_password@p2p_postgres:5432/p2p_exchange_dev
      REDIS_URL: redis://p2p_redis:6379/0
      SECRET_KEY: p2p-secret-key-change-in-prod
      JWT_SECRET_KEY: p2p-jwt-secret-key-change-in-prod
    depends_on:
      p2p_postgres:
        condition: service_healthy
      p2p_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p2p_network
    restart: on-failure

  p2p_nginx:
    image: nginx:alpine
    container_name: p2p_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - p2p_backend
    networks:
      - p2p_network
    restart: on-failure

volumes:
  p2p_postgres_data:
    driver: local

networks:
  p2p_network:
    driver: bridge
